version: '3.8'

services:
  mysql-db:
    image: mysql:8
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: order_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - my-network
    healthcheck:
      test: [ "CMD", "mysqladmin" ,"ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10

  order-service:
    build: .
    container_name: order-service
    restart: always
    environment:
      DB_USERNAME: root
      DB_PASSWORD: 1234
    ports:
      - "8082:8082"
    depends_on:
     mysql-db:
        condition: service_healthy
    networks:
      - my-network

volumes:
  mysql_data:

networks:
  my-network:
